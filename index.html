        const grid = document.getElementById('directoryGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');

        function render(data) {
            grid.innerHTML = data.map(item => `
                <a href="${item.url}" target="_blank" class="group bg-white dark:bg-slate-800 rounded-xl overflow-hidden shadow-md hover:shadow-2xl hover:scale-[1.02] transition-all duration-300 border border-slate-100 dark:border-slate-700">
                    <div class="aspect-video overflow-hidden">
                        <img src="images/${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="${item.name}">
                    </div>
                    <div class="p-6">
                        <span class="text-[10px] font-bold tracking-widest uppercase text-red-600 dark:text-red-400 mb-2 block">${item.category}</span>
                        <h3 class="text-xl font-bold mb-2 group-hover:text-red-600 transition-colors">${item.name}</h3>
                        <p class="text-slate-600 dark:text-slate-400 text-sm line-clamp-2 mb-4">${item.desc}</p>
                        <span class="text-sm font-semibold flex items-center">
                            Join Group <svg class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        </span>
                    </div>
                </a>
            `).join('');
        }

        // Search logic
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = groups.filter(g => g.name.toLowerCase().includes(term) || g.desc.toLowerCase().includes(term));
            render(filtered);
        });

        // Filter logic
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const cat = btn.dataset.category;
                filterBtns.forEach(b => b.classList.remove('bg-slate-800', 'text-white'));
                filterBtns.forEach(b => b.classList.add('bg-white', 'dark:bg-slate-800'));
                btn.classList.add('bg-slate-800', 'text-white');
                
                const filtered = cat === 'all' ? groups : groups.filter(g => g.category === cat);
                render(filtered);
            });
        });

        // Initial Load
        render(groups);
